packages:
  - "apps/*"
  - "packages/*"
  - "docs"

allowBuilds:
  '@swc/core': true
  esbuild: true
  oxc-resolver: true
  # postinstall only prints a funding notice; no build needed
  core-js-pure: false

minimumReleaseAgeExclude:
  - tsx@4.22.2

# see: https://github.com/sukramj/home-assistant-matter-bridge/security/dependabot
overrides:
  # General overrides (migrated from package.json pnpm.overrides; ignored there in pnpm 11)
  ajv: ">=8.20.0"
  qs: ">=6.15.2"
  js-yaml: "^4.2.0"
  mdast-util-to-hast: ">=13.2.1"
  undici: "^7.28.0"
  "@isaacs/brace-expansion": ">=5.0.1"
  minimatch: ">=10.2.5"
  rollup: ">=4.60.4"
  markdown-it: ">=14.2.0"
  linkify-it: "^5.0.1"
  "@babel/core": "^7.29.6"
  "@codemirror/view": "6.43.0"
  path-to-regexp: ">=8.4.2"
  brace-expansion: ">=5.0.6"
  yaml: ">=2.9.0"
  # Range-specific security overrides (dependabot)
  "form-data@>=4.0.0 <4.0.6": "4.0.6"
  "tmp@<=0.2.4": "0.2.5"
  "brace-expansion@>=1.0.0 <=1.1.11": "1.1.12"
  "brace-expansion@>=2.0.0 <=2.0.1": "2.0.2"
